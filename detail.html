<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="no-referrer-when-downgrade" />
  <title>Detail Video - Vid18+</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="detail.css" />

  <!-- Google IMA SDK untuk VAST -->
  <script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>
</head>
<body>

  <!-- Header -->
  <header class="main-header">
    <div class="header-container">
      <div class="logo">
        <a href="index.html" style="text-decoration:none;">
          <h1>Vid18+</h1>
        </a>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="main-content">
    <div class="detail-container">

      <!-- Navigasi -->
      <div class="nav-buttons">
        <button class="back-btn" onclick="history.back()">← Kembali</button>
        <button class="home-btn" onclick="window.location.href='index.html'">🏠 Beranda</button>
      </div>

      <!-- Wrapper Video + Overlay Iklan -->
      <div class="video-wrapper">

        <!-- Overlay (tampil sebelum play) -->
        <div id="ad-overlay" class="ad-overlay">
          <div class="ad-overlay-inner">
            <p class="ad-label">⚡ Konten siap diputar</p>
            <button id="play-with-ad" class="play-ad-btn">▶ Putar Video</button>
          </div>
        </div>

        <!-- Container untuk IMA SDK merender iklan -->
        <div id="ad-container" style="
          position: absolute;
          inset: 0;
          z-index: 5;
          pointer-events: none;
          display: none;
        "></div>

        <!-- Video Player utama — controls wajib ada agar bisa skip/seek -->
        <div class="video-container">
          <video id="video-player" class="video-player" controls preload="metadata" playsinline></video>
        </div>

      </div>

      <!-- Info Video -->
      <div class="video-info">
        <h1 id="video-title" class="video-title">Memuat...</h1>
        <div class="video-meta">
          <span id="video-views">▶ 0 penonton</span>
          <span id="video-category" class="video-category">—</span>
        </div>
        <p id="video-description" class="video-description"></p>
      </div>

      <!-- Action Buttons -->
      <div class="action-buttons">
        <button id="share-btn" class="action-btn share-btn">
          <span class="btn-icon">📤</span>
          <span class="btn-text">Share</span>
        </button>
        <button id="download-btn" class="action-btn download-btn">
          <span class="btn-icon">⬇️</span>
          <span class="btn-text">Download</span>
        </button>
      </div>

      <!-- Related Videos -->
      <section class="related-videos">
        <h2 class="section-title">Video Lainnya</h2>
        <div id="related-grid" class="movies-grid">
          <div class="loading-movies">
            <div class="spinner"></div>
            <p>Memuat video lainnya...</p>
          </div>
        </div>
      </section>

    </div>
  </main>

  <script type="module" src="detail.js"></script>

  <!-- HilltopAds VAST via Google IMA SDK -->
  <script>
    (function () {
      var VAST_URL  = 'https://aptpassage.com/d.mEFLzOdsGXNWv/ZnGEUm/Tesmr9ou/ZLUxlKknP/TiYR3GMTDlMZ4JMTD_Ydt/N/jMcAwtM/zIgjwjNQyzZgsNacW/1-p/d/DM0LxZ';
      var adFired   = false;

      var overlay     = document.getElementById('ad-overlay');
      var playBtn     = document.getElementById('play-with-ad');
      var player      = document.getElementById('video-player');
      var adContainer = document.getElementById('ad-container');

      var adsLoader, adsManager;

      // Setelah iklan selesai: sembunyikan ad-container, kembalikan kontrol video
      function adDone() {
        adContainer.style.display      = 'none';
        adContainer.style.pointerEvents = 'none';
        player.play().catch(function () {});
      }

      function initIMA() {
        // Tampilkan ad-container hanya saat iklan berjalan
        adContainer.style.display = 'block';

        var adDisplayContainer = new google.ima.AdDisplayContainer(adContainer, player);
        adDisplayContainer.initialize();

        adsLoader = new google.ima.AdsLoader(adDisplayContainer);

        adsLoader.addEventListener(
          google.ima.AdsManagerLoadedEvent.Type.ADS_MANAGER_LOADED,
          onAdsManagerLoaded,
          false
        );

        adsLoader.addEventListener(
          google.ima.AdErrorEvent.Type.AD_ERROR,
          onAdError,
          false
        );

        var adsRequest                   = new google.ima.AdsRequest();
        adsRequest.adTagUrl              = VAST_URL;
        adsRequest.linearAdSlotWidth     = player.clientWidth  || 640;
        adsRequest.linearAdSlotHeight    = player.clientHeight || 360;

        adsLoader.requestAds(adsRequest);
      }

      function onAdsManagerLoaded(event) {
        adsManager = event.getAdsManager(player);

        // Saat iklan mulai tayang: aktifkan klik (untuk tombol skip & klik iklan)
        adsManager.addEventListener(google.ima.AdEvent.Type.STARTED, function () {
          adContainer.style.pointerEvents = 'auto';
        });

        // Iklan selesai atau di-skip → putar video utama
        adsManager.addEventListener(
          google.ima.AdEvent.Type.CONTENT_RESUME_REQUESTED,
          adDone
        );

        // Semua event error → fallback putar video
        adsManager.addEventListener(google.ima.AdErrorEvent.Type.AD_ERROR, onAdError);

        try {
          adsManager.init(
            player.clientWidth  || 640,
            player.clientHeight || 360,
            google.ima.ViewMode.NORMAL
          );
          adsManager.start();
        } catch (e) {
          adDone();
        }
      }

      function onAdError(event) {
        console.warn('IMA Ad Error:', event.getError ? event.getError().toString() : event);
        if (adsManager) adsManager.destroy();
        adDone(); // Gagal muat iklan → tetap putar video
      }

      function fireAd() {
        if (adFired) return;
        adFired = true;

        // Sembunyikan overlay tombol play
        if (overlay) overlay.style.display = 'none';

        // Jalankan IMA SDK
        if (window.google && window.google.ima) {
          initIMA();
        } else {
          // IMA SDK belum termuat → langsung putar video
          player.play().catch(function () {});
        }
      }

      // Klik tombol overlay → jalankan iklan VAST
      if (playBtn) {
        playBtn.addEventListener('click', function () {
          fireAd();
        });
      }

      // Fallback: user bypass overlay → tahan video, jalankan iklan dulu
      if (player) {
        player.addEventListener('play', function () {
          if (!adFired) {
            player.pause();
            fireAd();
          }
        }, { once: true });
      }

      // Resize handler agar iklan tetap pas di layar
      window.addEventListener('resize', function () {
        if (adsManager) {
          adsManager.resize(
            player.clientWidth  || 640,
            player.clientHeight || 360,
            google.ima.ViewMode.NORMAL
          );
        }
      });

    })();
  </script>

</body>
</html>
