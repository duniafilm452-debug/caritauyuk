name: Auto Update Sitemap

on:
  # Otomatis jalan setiap hari jam 07.00 WIB (00.00 UTC)
  schedule:
    - cron: "0 0 * * *"

  # Bisa dijalankan manual dari tab Actions di GitHub
  workflow_dispatch:

jobs:
  update-sitemap:
    runs-on: ubuntu-latest

    steps:
      # 1. Ambil kode dari repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 3. Jalankan script generate sitemap
      - name: Generate sitemap.xml
        run: node generate-sitemap.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      # 4. Commit & push sitemap.xml yang baru ke repository
      - name: Commit & Push sitemap.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git diff --staged --quiet || git commit -m "chore: auto-update sitemap.xml [$(date +'%Y-%m-%d %H:%M')]"
          git push
