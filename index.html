    ADSTERRA ADS — Strategi CPM Tinggi, Tidak Mengganggu:
    1. Popunder   → Adsterra kelola sendiri (first-click)
    2. Social Bar → Widget mengambang, non-intrusive
    3. Sticky 320×50 → Muncul 3 detik setelah load, bisa ditutup
    4. Native Banner → Menyatu dengan konten, non-blocking

    <!-- [4] Adsterra Native Banner (menyatu dengan konten, CPM tinggi) -->

    </div>

  </main>

  <!-- [3] Adsterra Sticky Bottom Banner 320×50 (muncul 3 detik setelah load, bisa ditutup) -->
  <div class="ad-sticky-bar" id="ad-sticky-bar" style="display:none;">
    <button class="ad-close" id="ad-close-btn" title="Tutup">✕</button>
    <div id="sticky-ad-inner">
      <script>
        atOptions = {
          'key' : '817fc1b491510c6a8e09a78db3eb483e',
          'format' : 'iframe',
          'height' : 50,
          'width' : 320,

    </div>
  </div>

  <script type="module" src="script.js"></script>

  <!-- Sticky bar: tampil setelah 3 detik, bisa ditutup -->
  <script>
    (function () {
      var bar      = document.getElementById('ad-sticky-bar');
      var closeBtn = document.getElementById('ad-close-btn');

      setTimeout(function () {
        if (bar) bar.style.display = 'flex';
      }, 3000);

      if (closeBtn) {
        closeBtn.addEventListener('click', function () {
          if (bar) bar.style.display = 'none';
        });
      }
    })();
  </script>
